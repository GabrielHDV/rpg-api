services:

  db:
    image: postgres:15-alpine
    container_name: rpg_postgres
    restart: always
    environment:
      POSTGRES_USER: rpg_user
      POSTGRES_PASSWORD: rpg_password
      POSTGRES_DB: rpg_db
    volumes:
      # os dados do banco ficam salvos aqui mesmo reiniciando
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rpg_user -d rpg_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: rpg_api
    restart: always
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    #sobe depois que o banco estiver pronto
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
